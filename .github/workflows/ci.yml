name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy gamerscroll
        continue-on-error: true

      - name: Run pytest
        run: pytest tests/ -v

  build-smoke:
    name: Build Smoke
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: python scripts/make_icon.py

      - name: Build with PyInstaller
        run: python -m PyInstaller GamerScroll.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamerScroll-exe
          path: dist/GamerScroll.exe
          retention-days: 30